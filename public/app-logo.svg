<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <circle cx="256" cy="256" r="240" fill="url(#shine)"/>

  <!-- Circuit-board accent lines -->
  <g stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none">
    <line x1="120" y1="180" x2="160" y2="180"/>
    <line x1="160" y1="180" x2="160" y2="140"/>
    <line x1="352" y1="332" x2="392" y2="332"/>
    <line x1="392" y1="332" x2="392" y2="372"/>
    <line x1="120" y1="332" x2="160" y2="332"/>
    <line x1="160" y1="332" x2="160" y2="372"/>
    <line x1="352" y1="180" x2="392" y2="180"/>
    <line x1="392" y1="180" x2="392" y2="140"/>
    <circle cx="160" cy="140" r="4" fill="rgba(255,255,255,0.2)" stroke="none"/>
    <circle cx="160" cy="372" r="4" fill="rgba(255,255,255,0.2)" stroke="none"/>
    <circle cx="392" cy="140" r="4" fill="rgba(255,255,255,0.2)" stroke="none"/>
    <circle cx="392" cy="372" r="4" fill="rgba(255,255,255,0.2)" stroke="none"/>
  </g>

  <!-- "AF" monogram -->
  <text
    x="256" y="300"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="160"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-8"
  >AF</text>
</svg>
