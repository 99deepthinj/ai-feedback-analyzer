<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="AI Feedback Analyzer">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="fl" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#fg)"/>

  <!-- Trend line -->
  <polyline points="5,24 11,19 19,13 27,7" fill="none" stroke="url(#fl)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Baseline -->
  <line x1="4" y1="26.5" x2="28" y2="26.5" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <!-- Nodes -->
  <circle cx="5"  cy="24" r="2.2" fill="#C4B5FD"/>
  <circle cx="11" cy="19" r="2.4" fill="#C4B5FD"/>
  <circle cx="19" cy="13" r="2.6" fill="#DDD6FE"/>
  <circle cx="27" cy="7"  r="3"   fill="#EDE9FE"/>

  <!-- Sparkle on top node -->
  <path d="M27 4 L27.8 6.2 L30 7 L27.8 7.8 L27 10 L26.2 7.8 L24 7 L26.2 6.2 Z" fill="#7C3AED" opacity="0.9"/>
</svg>
